services:
  # Banco de Dados da Ótica
  retsys_db:
    image: postgres:16-alpine
    container_name: retsys_postgres_container
    restart: always
    environment:
      POSTGRES_USER: retsys_dev
      POSTGRES_PASSWORD: SenhaSeguraOtica2026
      POSTGRES_DB: retsys_db_prod
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - retsys_network

  # Motor de IA Local para OCR das Receitas
  ollama:
    image: ollama/ollama:latest
    container_name: retsys_ollama_container
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - retsys_network

networks:
  retsys_network:
    driver: bridge

volumes:
  postgres_data:
  ollama_data: # Volume persistente para não perder os modelos baixados ao reiniciar o container